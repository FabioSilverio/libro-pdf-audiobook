<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e08a6e"/>
      <stop offset="1" stop-color="#b8624a"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8d4832"/>
      <stop offset="1" stop-color="#5c2e20"/>
    </linearGradient>
  </defs>
  <!-- subtle background rounded square for the rest of icon's bounds -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#faf9f5"/>
  <!-- book shape -->
  <g transform="translate(8,10)">
    <!-- back cover (darker) -->
    <path d="M2 4 Q2 2 4 2 L44 2 Q46 2 46 4 L46 42 Q46 44 44 44 L4 44 Q2 44 2 42 Z"
          fill="url(#spine)"/>
    <!-- pages -->
    <rect x="4" y="4" width="40" height="38" rx="1" fill="#fdfcf5"/>
    <!-- orange front cover -->
    <path d="M6 4 Q6 2 8 2 L44 2 Q46 2 46 4 L46 42 Q46 44 44 44 L8 44 Q6 44 6 42 Z"
          fill="url(#cover)"/>
    <!-- spine accent line -->
    <rect x="6" y="2" width="2" height="42" fill="#8d4832" opacity="0.35"/>
    <!-- bookmark -->
    <path d="M36 2 L36 18 L32 14 L28 18 L28 2 Z" fill="#faf9f5" opacity="0.9"/>
    <!-- title bars -->
    <rect x="14" y="14" width="18" height="2.5" rx="1.25" fill="#faf9f5" opacity="0.85"/>
    <rect x="14" y="20" width="12" height="2" rx="1" fill="#faf9f5" opacity="0.7"/>
  </g>
</svg>
